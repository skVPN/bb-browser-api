version: "3.9"

services:

  bb-browser:
    build:
      context: .
      dockerfile: Dockerfile
    image: bb-browser:latest
    container_name: bb-browser
    restart: unless-stopped

    ports:
      - "6080:6080"    # noVNC 网页访问
      - "5900:5900"    # 原生 VNC（可选）
      - "18888:18888"  # bb-browser HTTP API

    environment:
      DISPLAY_NUM: "99"
      SCREEN_WIDTH: "1280"
      SCREEN_HEIGHT: "900"
      BB_DAEMON_PORT: "18888"
      BB_CDP_PORT: "9222"
      VNC_PORT: "5900"
      NOVNC_PORT: "6080"
      BB_BROWSER_HOME: /data/bb-browser
      # VNC 连接密码，留空则不需要密码
      VNC_PASSWORD: "changeme"

    volumes:
      # ★ 代码挂载（改代码不需要重新 build 镜像）
      - ./:/app
      # node_modules 用 volume（避免宿主机和容器的 node_modules 冲突）
      - node_modules:/app/node_modules
      # 持久化数据
      - chrome-profile:/data/chrome-profile
      - bb-browser-data:/data/bb-browser

    shm_size: "512mb"

    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:6080"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 3

volumes:
  node_modules:      # 容器内的 node_modules，避免和宿主机冲突
  chrome-profile:
  bb-browser-data:
