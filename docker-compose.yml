version: "3.9"

services:

  bb-browser:
    build:
      context: .
      dockerfile: Dockerfile
    image: bb-browser:latest
    container_name: bb-browser
    restart: unless-stopped

    ports:
      - "6080:6080"    # noVNC 网页访问入口 → 打开 http://localhost:6080/vnc.html
      - "5900:5900"    # 原生 VNC 客户端（可选，用 VNC Viewer 连接）
      - "18888:18888"  # bb-browser HTTP API

    environment:
      DISPLAY_NUM: "99"
      SCREEN_WIDTH: "1280"
      SCREEN_HEIGHT: "900"
      BB_DAEMON_PORT: "18888"
      BB_CDP_PORT: "9222"
      VNC_PORT: "5900"
      NOVNC_PORT: "6080"
      BB_BROWSER_HOME: /data/bb-browser
      # VNC 连接密码，留空则不需要密码
      VNC_PASSWORD: "changeme"

    volumes:
      # 持久化 Chrome 用户数据（保留 Cookie、登录态）
      - chrome-profile:/data/chrome-profile
      - bb-browser-data:/data/bb-browser

    shm_size: "512mb"

    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:6080"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3

volumes:
  chrome-profile:
  bb-browser-data:
