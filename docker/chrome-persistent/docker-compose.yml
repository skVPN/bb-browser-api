version: '3.8'

services:
  chrome:
    build: .
    ports:
      - "9222:9222"
    shm_size: 2gb
    restart: unless-stopped
    environment:
      - DISPLAY=:99
    volumes:
      - chrome-data:/data
    command: >
      chromium-browser
      --headless
      --no-sandbox
      --disable-dev-shm-usage
      --disable-gpu
      --remote-debugging-address=0.0.0.0
      --remote-debugging-port=9222
      --user-data-dir=/data
      about:blank

volumes:
  chrome-data:
