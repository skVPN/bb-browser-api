[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid
user=root

[program:xvfb]
command=Xvfb :%(ENV_DISPLAY_NUM)s -screen 0 %(ENV_SCREEN_WIDTH)sx%(ENV_SCREEN_HEIGHT)sx24 -ac +extension GLX +render -noreset
autostart=true
autorestart=true
startretries=3
startsecs=2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

[program:fluxbox]
command=fluxbox
autostart=true
autorestart=true
startretries=3
startsecs=2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20
environment=DISPLAY=":%(ENV_DISPLAY_NUM)s"

[program:x11vnc]
command=/bin/sh /start-x11vnc.sh
autostart=true
autorestart=true
startretries=5
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=30

[program:novnc]
command=websockify --web /usr/share/novnc %(ENV_NOVNC_PORT)s 127.0.0.1:%(ENV_VNC_PORT)s
autostart=true
autorestart=true
startretries=5
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=40

[program:chromium]
command=chromium --no-sandbox --disable-dev-shm-usage --remote-debugging-address=127.0.0.1 --remote-debugging-port=%(ENV_BB_CDP_PORT)s --user-data-dir=/data/chrome-profile --no-first-run --no-default-browser-check --disable-translate --window-size=%(ENV_SCREEN_WIDTH)s,%(ENV_SCREEN_HEIGHT)s --start-maximized about:blank
autostart=true
autorestart=true
startretries=3
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=50
environment=DISPLAY=":%(ENV_DISPLAY_NUM)s"

[program:bb-daemon]
command=node /app/dist/daemon.js --host 0.0.0.0 --port %(ENV_BB_DAEMON_PORT)s --cdp-host 127.0.0.1 --cdp-port %(ENV_BB_CDP_PORT)s
autostart=true
autorestart=true
startretries=5
startsecs=8
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=60
environment=BB_BROWSER_HOME="/data/bb-browser"
